<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Marian ❤️</title>

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #d26db9, #fffdff);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
    width: 100%;
    padding: 20px;
}

.envelope {
    width: min(320px, 85vw);
    aspect-ratio: 16/11;
    position: relative;
    margin: auto;
    background: #d0149a;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

.envelope-body {
    width: 100%;
    height: 90%;
    background: #e88fca;
    position: absolute;
    bottom: 0;
    border-radius: 8px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.envelope-body::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 50%;
    height: 100%;
    background: #f09aab;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
}

.envelope-body::after {
    content: "";
    position: absolute;
    right: 0;
    top: 0;
    width: 50%;
    height: 100%;
    background: #f09aab;
    clip-path: polygon(100% 0, 0 50%, 100% 100%);
}

.envelope-flap {
    width: 100%;
    height: 55%;
    background: #e77d99;
    position: absolute;
    top: 0;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    z-index: 2;
}

.seal {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(50px, 14vw);
    height: min(50px, 14vw);
    background: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: clamp(18px, 5vw, 24px);
    z-index: 3;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
}

button {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: clamp(14px, 3vw, 16px);
    transition: .3s;
}

button:hover {
    transform: scale(1.05);
}

.open-btn {
    background: #ff6f61;
    color: white;
}

.yes {
    background: #4caf50;
    color: white;
}

.hidden {
    display: none;
}

h1 {
    color: white;
    text-shadow: 2px 2px 10px rgba(0, 0, 0, .2);
    font-size: clamp(1.6rem, 5vw, 2.8rem);
}

.options {
    display: flex;
    justify-content: center;
    margin-top: 25px;
}

</style>
</head>
<body>

<div class="container">

<div id="envelopeSection">

<div class="envelope">
    <div class="envelope-body"></div>
    <div class="envelope-flap"></div>
    <div class="seal">❤️</div>
</div>

<button class="open-btn" onclick="openEnvelope()">
Abrir sobre
</button>

</div>

<div id="proposalSection" class="hidden">

<h1>
Marian Abigaíl Meza Santos,<br><br>
¿Quieres ser mi novia? ❤️
</h1>

<div class="options">
    <button class="yes" onclick="yesAnswer()">
        Sí 
    </button>
</div>

</div>

</div>

<script>

function openEnvelope() {
    document.getElementById("envelopeSection").classList.add("hidden");
    document.getElementById("proposalSection").classList.remove("hidden");
}

function yesAnswer() {
    document.body.innerHTML = `
    <div style="
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        text-align: center;
    ">
        <h1>❤️ ENVÍAME CAPTURA ❤️</h1>
        <h2>Te amo mi reina hermosa ❤️</h2>
    </div>
    `;
}

</script>

</body>
</html>
